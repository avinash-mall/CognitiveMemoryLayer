# ============================================================================
# Unified Model Pipeline Configuration
# ============================================================================
# This file controls BOTH:
#   1) data preparation for all model families
#   2) training/evaluation for all model families
#
# Design goal:
# - one prepare script (`packages/models/scripts/prepare.py`)
# - one train script (`packages/models/scripts/train.py`)
#
# All paths can be absolute OR relative to repository root.
# ============================================================================

[paths]
# Directory for prepared parquet outputs created by prepare.py
prepared_dir = "packages/models/prepared_data/modelpack"

# Directory containing legacy/bootstrapped prepared splits used as weak labels
# Expected files (optional): train.parquet, test.parquet, eval.parquet
bootstrap_prepared_dir = "packages/models/prepared_data"

# Final model output directory used by train.py
# User requirement: all models must be written here.
trained_models_dir = "packages/models/trained_models"

# Dataset storage/caching directory used by `datasets` package.
# Uses existing project folder (flat raw datasets can coexist here).
datasets_cache_dir = "packages/models/datasets"

[prepare]
# Global random seed for sampling/shuffling/splits
seed = 42

# Split ratios for stratified split by (task,label)
train_ratio = 0.80
test_ratio = 0.10
eval_ratio = 0.10

# Maximum rows sampled per source dataset (upper bound before balancing)
max_rows_per_source = 60000

# Minimum rows required per (task,label). Existing rows are kept and
# LLM synthesis fills any gap up to at least this count.
target_per_task_label = 10000

# Hard cap per (task,label); must be >= target_per_task_label.
max_per_task_label = 50000

# If true, required remote datasets are auto-downloaded when missing
# (through Hugging Face datasets loader).
auto_download_missing = true

# If true, missing `datasets` package is treated as an error.
# Set false only for strictly local-only prep runs.
require_datasets_package = true

[train]
# Random seed for model training
seed = 42

# Families to train. Keep all 3 for complete replacement.
families = ["router", "extractor", "pair"]

# TF-IDF settings
max_features = 250000
min_df = 2
ngram_min = 1
ngram_max = 2

# SGDClassifier settings
# `max_iter` behaves like epochs for SGD over sparse features.
max_iter = 25
alpha = 0.00001

# Prediction batch size for progress/evaluation
predict_batch_size = 8192

# ============================================================================
# Task-level training specifications (Phase 0 pipeline extension)
# ============================================================================
# Each [[tasks]] block defines a custom model to train independently of the
# family-level TF-IDF classifiers.  Backward compat: when no [[tasks]] blocks
# exist the pipeline falls back to the family-only flow.
#
# Fields:
#   task_name     - unique identifier (artifact prefix)
#   family        - data family used for feature loading (router/extractor/pair)
#   input_type    - "single" or "pair"
#   objective     - "classification" | "pair_ranking" | "single_regression" | "token_classification"
#   labels        - expected label set (classification), [] for regression/ranking
#   artifact_name - output model filename stem
#   metrics       - list of metric keys to report

[[tasks]]
task_name = "retrieval_constraint_relevance_pair"
family = "pair"
input_type = "pair"
objective = "pair_ranking"
labels = []
artifact_name = "retrieval_constraint_relevance_pair"
metrics = ["mrr@10", "ndcg@10", "recall@10"]

[[tasks]]
task_name = "memory_rerank_pair"
family = "pair"
input_type = "pair"
objective = "pair_ranking"
labels = []
artifact_name = "memory_rerank_pair"
metrics = ["mrr@10", "ndcg@10", "recall@10"]

[[tasks]]
task_name = "novelty_pair"
family = "pair"
input_type = "pair"
objective = "classification"
labels = ["duplicate", "novel", "temporal_change", "contradiction"]
artifact_name = "novelty_pair"
metrics = ["accuracy", "macro_f1", "weighted_f1"]

[[tasks]]
task_name = "fact_extraction_structured"
family = "extractor"
input_type = "single"
objective = "token_classification"
labels = []
artifact_name = "fact_extraction_structured"
metrics = ["span_f1", "span_exact_match"]

[[tasks]]
task_name = "schema_match_pair"
family = "pair"
input_type = "pair"
objective = "classification"
labels = ["match", "no_match"]
artifact_name = "schema_match_pair"
metrics = ["accuracy", "macro_f1", "weighted_f1"]

[[tasks]]
task_name = "reconsolidation_candidate_pair"
family = "pair"
input_type = "pair"
objective = "pair_ranking"
labels = []
artifact_name = "reconsolidation_candidate_pair"
metrics = ["mrr@10", "ndcg@10", "recall@10"]

[[tasks]]
task_name = "write_importance_regression"
family = "router"
input_type = "single"
objective = "single_regression"
labels = []
artifact_name = "write_importance_regression"
metrics = ["mae", "rmse"]

[[tasks]]
task_name = "pii_span_detection"
family = "extractor"
input_type = "single"
objective = "token_classification"
labels = []
artifact_name = "pii_span_detection"
metrics = ["span_f1", "span_exact_match"]

[[tasks]]
task_name = "consolidation_gist_quality"
family = "router"
input_type = "single"
objective = "classification"
labels = ["accept", "reject"]
artifact_name = "consolidation_gist_quality"
metrics = ["accuracy", "macro_f1", "weighted_f1"]

[[tasks]]
task_name = "forgetting_action_policy"
family = "router"
input_type = "single"
objective = "classification"
labels = ["keep", "decay", "silence", "compress", "delete"]
artifact_name = "forgetting_action_policy"
metrics = ["accuracy", "macro_f1", "weighted_f1"]

[synthetic_llm]
# Synthetic generation is LLM-only.
# Provider/model/base URL are loaded from env first.
#
# Required env values (user preference):
#   LLM_EVAL__PROVIDER=ollama
#   LLM_EVAL__MODEL=gemma3:12b
#   LLM_EVAL__BASE_URL=http://localhost:11434/v1
provider_env = "LLM_EVAL__PROVIDER"
model_env = "LLM_EVAL__MODEL"
base_url_env = "LLM_EVAL__BASE_URL"
provider = "ollama"
model = ""
base_url = ""
api_key_env = "OPENAI_API_KEY"

# Higher randomness for diversity.
temperature = 1.35
top_p = 0.95
max_tokens = 1024
batch_size = 24

# Number of concurrent chat-completion requests during synthetic fill.
# Increase for higher throughput on multi-GPU vLLM backends.
concurrency = 8

timeout_seconds = 120
max_retries = 3

# Retry budget per (task,label) while filling missing rows.
max_attempts_per_label = 80

# Telemetry cadence for long synth runs.
log_stats_every_seconds = 10.0
log_zero_progress_every = 5
parse_failure_log_every = 20
log_request_failures = true

# Only the first N rows/lines from each local raw dataset file are scanned
# to build seed pools (fast structure probing).
local_raw_scan_rows_per_file = 300

[multilingual]
# When true, synthetic LLM generation is distributed across the top 15 languages
# (weighted: English ~30%, others ~5% each). Use --no-multilingual to disable.
enabled = true
# Fraction of synthetic data that should be English (rest distributed across other languages).
english_weight = 0.30

# ============================================================================
# Remote datasets (auto-downloaded by prepare.py when enabled=true)
# ============================================================================
# Fields:
# - name: unique key used by preparation logic
# - target: which model family primarily consumes this dataset
# - kind: currently supports "huggingface"
# - link: human-readable reference URL (docs / source provenance)
# - dataset_id: HF dataset identifier
# - config: optional HF config/subset
# - split: HF split name (train/validation/test)
# - max_rows: optional per-dataset cap override
# - enabled: include this dataset in pipeline
# - required: fail prep if download/load fails

[[datasets]]
name = "banking77"
target = "router"
kind = "huggingface"
link = "https://huggingface.co/datasets/banking77"
dataset_id = "banking77"
config = ""
split = "train"
max_rows = 60000
enabled = true
required = true

