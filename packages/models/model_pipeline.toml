# ============================================================================
# Unified Model Pipeline Configuration
# ============================================================================
# This file controls BOTH:
#   1) data preparation for all model families
#   2) training/evaluation for all model families
#
# Design goal:
# - one prepare script (`packages/models/scripts/prepare.py`)
# - one train script (`packages/models/scripts/train.py`)
#
# All paths can be absolute OR relative to repository root.
# ============================================================================

[paths]
# Directory for prepared parquet outputs created by prepare.py
prepared_dir = "packages/models/prepared_data/modelpack"

# Directory containing legacy/bootstrapped prepared splits used as weak labels
# Expected files (optional): train.parquet, test.parquet, eval.parquet
bootstrap_prepared_dir = "packages/models/prepared_data"

# Final model output directory used by train.py
# User requirement: all models must be written here.
trained_models_dir = "packages/models/trained_models"

# Dataset storage/caching directory used by `datasets` package.
# Uses existing project folder (flat raw datasets can coexist here).
datasets_cache_dir = "packages/models/datasets"

[prepare]
# Global random seed for sampling/shuffling/splits
seed = 42

# Split ratios for stratified split by (task,label)
train_ratio = 0.80
test_ratio = 0.10
eval_ratio = 0.10

# Maximum rows sampled per source dataset (upper bound before balancing)
max_rows_per_source = 60000

# Minimum rows required per (task,label). Existing rows are kept and
# LLM synthesis fills any gap up to at least this count.
target_per_task_label = 10000

# Hard cap per (task,label); must be >= target_per_task_label.
max_per_task_label = 50000

# If true, required remote datasets are auto-downloaded when missing
# (through Hugging Face datasets loader).
auto_download_missing = true

# If true, missing `datasets` package is treated as an error.
# Set false only for strictly local-only prep runs.
require_datasets_package = true

[train]
# Random seed for model training
seed = 42

# Families to train. Keep all 3 for complete replacement.
families = ["router", "extractor", "pair"]

# TF-IDF settings
max_features = 250000
min_df = 2
ngram_min = 1
ngram_max = 2

# SGDClassifier settings
# `max_iter` behaves like epochs for SGD over sparse features.
max_iter = 25
alpha = 0.00001

# Prediction batch size for progress/evaluation
predict_batch_size = 8192
early_stopping = true
early_stopping_patience = 3
early_stopping_metric = "macro_f1"
early_stopping_min_delta = 0.001
calibration_method = "sigmoid"
calibration_split = "eval"

[train.transformer]
model_name_or_path = "microsoft/deberta-v3-base"
tokenizer_name = ""
num_train_epochs = 2
per_device_train_batch_size = 8
per_device_eval_batch_size = 16
max_seq_length = 256
learning_rate = 0.00002
warmup_ratio = 0.1
weight_decay = 0.01
gradient_accumulation_steps = 1
score_margin = 0.15
focal_gamma = 1.5
temperature_grid = [0.7, 0.85, 1.0, 1.15, 1.3, 1.5, 2.0]

# ============================================================================
# Task-level training specifications (Phase 0 pipeline extension)
# ============================================================================
# Each [[tasks]] block defines a custom model to train independently of the
# family-level TF-IDF classifiers.  Backward compat: when no [[tasks]] blocks
# exist the pipeline falls back to the family-only flow.
#
# Fields:
#   task_name     - unique identifier (artifact prefix)
#   family        - data family used for feature loading (router/extractor/pair)
#   input_type    - "single" or "pair"
#   objective     - "classification" | "pair_ranking" | "single_regression" | "token_classification"
#   labels        - expected label set (classification), [] for regression/ranking
#   artifact_name - output model filename stem
#   metrics       - list of metric keys to report

[[tasks]]
task_name = "retrieval_constraint_relevance_pair"
family = "pair"
input_type = "pair"
objective = "pair_ranking"
labels = []
artifact_name = "retrieval_constraint_relevance_pair"
metrics = ["mrr@10", "ndcg@10", "recall@10"]
trainer = "transformer_pair"
backbone_model_name = "BAAI/bge-reranker-base"
# Extra epoch and tighter margin improve ranking precision on reranker tasks
num_train_epochs = 3
score_margin = 0.20

[[tasks]]
task_name = "memory_rerank_pair"
family = "pair"
input_type = "pair"
objective = "pair_ranking"
labels = []
artifact_name = "memory_rerank_pair"
metrics = ["mrr@10", "ndcg@10", "recall@10"]
trainer = "transformer_pair"
backbone_model_name = "BAAI/bge-reranker-base"
# Extra epoch and tighter margin improve ranking precision on reranker tasks
num_train_epochs = 3
score_margin = 0.20

[[tasks]]
task_name = "novelty_pair"
family = "pair"
input_type = "pair"
objective = "classification"
labels = ["duplicate", "novel", "changed"]
artifact_name = "novelty_pair"
metrics = ["accuracy", "macro_f1", "weighted_f1"]
trainer = "transformer_pair"
backbone_model_name = "BAAI/bge-reranker-base"
# 4 epochs: 2-epoch changed_f1 was borderline on test gate (0.78 target)
num_train_epochs = 4

[[tasks]]
task_name = "fact_extraction_structured"
family = "extractor"
input_type = "single"
objective = "token_classification"
labels = []
artifact_name = "fact_extraction_structured"
metrics = ["span_f1", "span_exact_match"]
enabled = true

[[tasks]]
task_name = "schema_match_pair"
family = "pair"
input_type = "pair"
objective = "classification"
labels = ["match", "no_match"]
artifact_name = "schema_match_pair"
metrics = ["accuracy", "macro_f1", "weighted_f1"]
trainer = "transformer_pair"
backbone_model_name = "BAAI/bge-reranker-base"
# 4 epochs: 2-epoch run shows eval=79.6% → test=67.9% distribution shift (-11.7pt).
# More epochs + more data (need target_per_task_label rows) should reduce gap.
num_train_epochs = 4

[[tasks]]
task_name = "reconsolidation_candidate_pair"
family = "pair"
input_type = "pair"
objective = "pair_ranking"
labels = []
artifact_name = "reconsolidation_candidate_pair"
metrics = ["mrr@10", "ndcg@10", "recall@10"]
trainer = "transformer_pair"
backbone_model_name = "BAAI/bge-reranker-base"
# Extra epoch and tighter margin for this reranker task
num_train_epochs = 3
score_margin = 0.20

[[tasks]]
task_name = "write_importance_regression"
family = "router"
input_type = "single"
objective = "single_regression"
labels = []
artifact_name = "write_importance_regression"
metrics = ["mae", "rmse"]
enabled = true

[[tasks]]
task_name = "memory_type"
family = "router"
input_type = "single"
objective = "classification"
labels = ["episodic_event", "semantic_fact", "preference", "constraint", "procedure", "hypothesis", "task_state", "conversation", "message", "tool_result", "reasoning_step", "scratch", "knowledge", "observation", "plan"]
artifact_name = "memory_type"
metrics = ["accuracy", "macro_f1", "weighted_f1"]
trainer = "hierarchical_transformer"
backbone_model_name = "microsoft/deberta-v3-base"
enabled = true

[[tasks]]
task_name = "salience_bin"
family = "router"
input_type = "single"
objective = "classification"
labels = ["low", "medium", "high"]
artifact_name = "salience_bin"
metrics = ["accuracy", "macro_f1", "weighted_f1", "ordinal_mae", "off_by_two_rate"]
trainer = "ordinal_threshold"
label_order = ["low", "medium", "high"]
enabled = true

[[tasks]]
task_name = "importance_bin"
family = "router"
input_type = "single"
objective = "classification"
labels = ["low", "medium", "high"]
artifact_name = "importance_bin"
metrics = ["accuracy", "macro_f1", "weighted_f1", "ordinal_mae", "off_by_two_rate"]
trainer = "ordinal_threshold"
label_order = ["low", "medium", "high"]
enabled = true

[[tasks]]
task_name = "confidence_bin"
family = "router"
input_type = "single"
objective = "classification"
labels = ["low", "medium", "high"]
artifact_name = "confidence_bin"
metrics = ["accuracy", "macro_f1", "weighted_f1", "ordinal_mae", "off_by_two_rate"]
trainer = "ordinal_threshold"
label_order = ["low", "medium", "high"]
enabled = true

[[tasks]]
task_name = "decay_profile"
family = "router"
input_type = "single"
objective = "classification"
labels = ["very_fast", "fast", "medium", "slow", "very_slow"]
artifact_name = "decay_profile"
metrics = ["accuracy", "macro_f1", "weighted_f1", "ordinal_mae", "off_by_two_rate"]
trainer = "ordinal_threshold"
label_order = ["very_fast", "fast", "medium", "slow", "very_slow"]
enabled = true

[[tasks]]
task_name = "pii_span_detection"
family = "extractor"
input_type = "single"
objective = "token_classification"
labels = []
artifact_name = "pii_span_detection"
metrics = ["span_f1", "span_exact_match"]
enabled = true

[[tasks]]
task_name = "consolidation_gist_quality"
family = "router"
input_type = "single"
objective = "classification"
labels = ["accept", "reject"]
artifact_name = "consolidation_gist_quality"
metrics = ["accuracy", "macro_f1", "weighted_f1"]
trainer = "transformer_text"
backbone_model_name = "microsoft/deberta-v3-base"

[[tasks]]
task_name = "forgetting_action_policy"
family = "router"
input_type = "single"
objective = "classification"
labels = ["keep", "decay", "silence", "compress", "delete"]
artifact_name = "forgetting_action_policy"
metrics = ["accuracy", "macro_f1", "weighted_f1"]
trainer = "transformer_text"
backbone_model_name = "microsoft/deberta-v3-base"
# 8 epochs: first 4-epoch run reached 0.61 test accuracy (gate: 0.85). Loss was still descending
# at epoch 4 (1.077→0.510→0.353→0.229), so more epochs are expected to push above the gate.
num_train_epochs = 8
# Reduced batch size and seq length to fit DeBERTa alongside uvicorn API server on 16 GiB GPU.
per_device_train_batch_size = 4
max_seq_length = 128

[[tasks]]
task_name = "constraint_dimension"
family = "router"
input_type = "single"
objective = "classification"
labels = ["policy", "goal", "value", "causal", "state", "other"]
artifact_name = "constraint_dimension"
metrics = ["accuracy", "macro_f1", "weighted_f1"]
trainer = "transformer_text"
backbone_model_name = "microsoft/deberta-v3-base"
# Router family TF-IDF has poor F1 on constraint_dimension; dedicated DeBERTa model needed.
# 3-epoch run collapsed (loss stuck at log(6)=1.791 throughout): semantic task is harder than
# lexical topic classification (context_tag). Fix: gradient_accumulation_steps=4 for stable
# gradient direction + higher learning_rate + more epochs.
num_train_epochs = 10
per_device_train_batch_size = 4
max_seq_length = 128
gradient_accumulation_steps = 4
learning_rate = 0.00005
enabled = true

[[tasks]]
task_name = "context_tag"
family = "router"
input_type = "single"
objective = "classification"
labels = ["general", "food", "travel", "finance", "health", "work", "tech", "social"]
artifact_name = "context_tag"
metrics = ["accuracy", "macro_f1", "weighted_f1"]
trainer = "transformer_text"
backbone_model_name = "microsoft/deberta-v3-base"
# Router family TF-IDF has poor F1 on context_tag; dedicated DeBERTa model needed.
num_train_epochs = 3
per_device_train_batch_size = 4
max_seq_length = 128
enabled = true

[synthetic_llm]
# Synthetic generation is LLM-only.
# Provider/model/base URL are loaded from env first.
#
# Recommended env values for the default local vLLM setup:
#   LLM_EVAL__PROVIDER=vllm
#   LLM_EVAL__MODEL=Qwen/Qwen3.5-9B
#   LLM_EVAL__BASE_URL=http://localhost:8000/v1
provider_env = "LLM_EVAL__PROVIDER"
model_env = "LLM_EVAL__MODEL"
base_url_env = "LLM_EVAL__BASE_URL"
provider = "vllm"
model = "Qwen/Qwen3.5-9B"
base_url = ""
api_key_env = "OPENAI_API_KEY"

# Conservative defaults for structured JSON generation.
temperature = 0.3
top_p = 0.9
max_tokens = 1536
batch_size = 4

# Number of concurrent chat-completion requests during synthetic fill.
# Increase for higher throughput on multi-GPU vLLM backends.
concurrency = 4

timeout_seconds = 120
max_retries = 3

# Retry budget per (task,label) while filling missing rows.
max_attempts_per_label = 40

# Telemetry cadence for long synth runs.
log_stats_every_seconds = 10.0
log_zero_progress_every = 5
parse_failure_log_every = 20
log_request_failures = true

# Only the first N rows/lines from each local raw dataset file are scanned
# to build seed pools (fast structure probing).
local_raw_scan_rows_per_file = 300

[multilingual]
# When true, synthetic LLM generation is distributed across the top 15 languages
# (weighted: English ~30%, others ~5% each). Use --no-multilingual to disable.
enabled = true
# Fraction of synthetic data that should be English (rest distributed across other languages).
english_weight = 0.30

[prepare.token]
target_examples_per_task = 40000
max_examples_per_task = 80000
max_spans_per_example = 16

[train.token]
# bert-base-multilingual-cased achieves span_exact_match=0.850 (gate: 0.84) with 8 epochs.
# distilbert-base-multilingual-cased tops out at 0.837 (fails gate). Upgrade to bert-base.
# Reaching 0.88 would require the full 200k pii-masking dataset (currently using ~30k English rows).
model_name_or_path = "bert-base-multilingual-cased"
num_train_epochs = 8
per_device_train_batch_size = 8
per_device_eval_batch_size = 16
max_seq_length = 256
stride = 64
learning_rate = 0.00005
warmup_ratio = 0.1
weight_decay = 0.01
gradient_accumulation_steps = 1

# ============================================================================
# Remote datasets (auto-downloaded by prepare.py when enabled=true)
# ============================================================================
# Fields:
# - name: unique key used by preparation logic
# - target: which model family primarily consumes this dataset
# - kind: currently supports "huggingface"
# - link: human-readable reference URL (docs / source provenance)
# - dataset_id: HF dataset identifier
# - config: optional HF config/subset
# - split: HF split name (train/validation/test)
# - max_rows: optional per-dataset cap override
# - usage_role: "supervision" | "llm_seed" | "eval_only"
# - task_targets: optional list of tasks this dataset primarily feeds
# - license: optional license/provenance note for shortlist reporting
# - enabled: include this dataset in pipeline
# - required: fail prep if download/load fails

