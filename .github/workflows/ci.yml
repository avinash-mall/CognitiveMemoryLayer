name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run ruff
        run: ruff check src tests packages/py-cml/src packages/py-cml/tests

      - name: Run ruff format
        run: ruff format --check src tests packages/py-cml/src packages/py-cml/tests

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create CI .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=memory
          POSTGRES_PASSWORD=memory
          POSTGRES_DB=memory
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=password
          NEO4J_AUTH=neo4j/password
          DATABASE__POSTGRES_URL=postgresql+asyncpg://memory:memory@postgres:5432/memory
          DATABASE__NEO4J_URL=bolt://neo4j:7687
          DATABASE__NEO4J_USER=neo4j
          DATABASE__NEO4J_PASSWORD=password
          DATABASE__NEO4J_BROWSER_URL=bolt://localhost:7687
          DATABASE__REDIS_URL=redis://redis:6379
          AUTH__API_KEY=test-key
          AUTH__ADMIN_API_KEY=test-key
          CML_API_KEY=test-key
          CML_ADMIN_API_KEY=test-key
          CML_BASE_URL=http://api:8000
          CML_TEST_URL=http://api:8000
          CML_TEST_API_KEY=test-key
          DEBUG=false
          EMBEDDING_INTERNAL__PROVIDER=mock
          FEATURES__USE_LLM_ENABLED=false
          LLM_STARTUP_VALIDATION_ENABLED=false
          LLM_STARTUP_VALIDATE_IN_CI=false
          EOF

      - name: Build app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: test
          tags: cml-app-ci:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: production
          tags: cml-api-ci:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start stack
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml up -d postgres neo4j redis api

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml exec -T api curl -fsS http://localhost:8000/api/v1/health >/dev/null; then
              exit 0
            fi
            echo "Waiting for API... ($i/60)"
            sleep 2
          done
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml logs api
          exit 1

      - name: Run full suite with coverage
        run: |
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml run --rm -v "$PWD:/workspace" app sh -lc "pytest tests packages/py-cml/tests -v --tb=short -rs --cov=src --cov=packages/py-cml/src/cml --cov-report=xml:/workspace/coverage.xml --cov-report=term && coverage report --include='src/*' --fail-under=75 && coverage report --include='src/*,packages/py-cml/src/cml/*' --fail-under=75"

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Stop stack
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml down -v

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name (lowercase for GHCR)
        run: echo "IMAGE_NAME=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

