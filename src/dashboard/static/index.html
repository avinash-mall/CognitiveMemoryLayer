<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognitive Memory Layer - Dashboard</title>
    <link rel="stylesheet" href="/dashboard/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Login overlay -->
    <div id="login-overlay" class="login-overlay hidden">
        <div class="login-card">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="var(--accent)" stroke-width="2"/>
                    <circle cx="24" cy="16" r="6" fill="var(--accent)" opacity="0.8"/>
                    <circle cx="14" cy="30" r="5" fill="var(--accent)" opacity="0.6"/>
                    <circle cx="34" cy="30" r="5" fill="var(--accent)" opacity="0.6"/>
                    <line x1="24" y1="22" x2="14" y2="26" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
                    <line x1="24" y1="22" x2="34" y2="26" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
                    <line x1="14" y1="30" x2="34" y2="30" stroke="var(--accent)" stroke-width="1.5" opacity="0.3"/>
                </svg>
            </div>
            <h2>Cognitive Memory Layer</h2>
            <p class="login-subtitle">Enter your admin API key to access the dashboard</p>
            <form id="login-form">
                <input type="password" id="api-key-input" placeholder="Admin API Key" autocomplete="off" required>
                <div id="login-error" class="login-error hidden"></div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Main app layout -->
    <div id="app" class="app-layout hidden">
        <!-- Sidebar -->
        <aside class="sidebar" role="complementary" aria-label="Dashboard navigation">
            <div class="sidebar-header">
                <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="var(--accent)" stroke-width="2"/>
                    <circle cx="24" cy="16" r="6" fill="var(--accent)" opacity="0.8"/>
                    <circle cx="14" cy="30" r="5" fill="var(--accent)" opacity="0.6"/>
                    <circle cx="34" cy="30" r="5" fill="var(--accent)" opacity="0.6"/>
                    <line x1="24" y1="22" x2="14" y2="26" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
                    <line x1="24" y1="22" x2="34" y2="26" stroke="var(--accent)" stroke-width="1.5" opacity="0.5"/>
                </svg>
                <span class="sidebar-title">CML Dashboard</span>
            </div>
            <nav class="sidebar-nav" role="navigation" aria-label="Primary">
                <a href="#overview" class="nav-item active" data-page="overview">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    </span>
                    <span class="nav-label">Overview</span>
                </a>
                <a href="#tenants" class="nav-item" data-page="tenants">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    </span>
                    <span class="nav-label">Tenants</span>
                </a>
                <a href="#memories" class="nav-item" data-page="memories">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                    </span>
                    <span class="nav-label">Memories</span>
                </a>
                <a href="#sessions" class="nav-item" data-page="sessions">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
                    </span>
                    <span class="nav-label">Sessions</span>
                </a>
                <a href="#events" class="nav-item" data-page="events">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    </span>
                    <span class="nav-label">Events</span>
                </a>
                <a href="#graph" class="nav-item" data-page="graph">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="12" y1="8" x2="19" y2="16"/></svg>
                    </span>
                    <span class="nav-label">Knowledge Graph</span>
                </a>
                <a href="#facts" class="nav-item" data-page="facts">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="9" y1="7" x2="17" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
                    </span>
                    <span class="nav-label">Facts</span>
                </a>
                <a href="#apiusage" class="nav-item" data-page="apiusage">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                    </span>
                    <span class="nav-label">API Usage</span>
                </a>
                <a href="#components" class="nav-item" data-page="components">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
                    </span>
                    <span class="nav-label">Components</span>
                </a>
                <a href="#config" class="nav-item" data-page="config">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    </span>
                    <span class="nav-label">Configuration</span>
                </a>
                <a href="#retrieval" class="nav-item" data-page="retrieval">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </span>
                    <span class="nav-label">Retrieval Test</span>
                </a>
                <a href="#management" class="nav-item" data-page="management">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
                    </span>
                    <span class="nav-label">Management</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="btn btn-ghost btn-sm" title="Toggle theme">
                    <span id="theme-icon">&#9790;</span>
                </button>
                <button id="logout-btn" class="btn btn-ghost btn-sm" title="Logout">
                    &#10148; Logout
                </button>
            </div>
        </aside>

        <!-- Main content -->
        <main class="main-content" role="main">
            <header class="top-bar">
                <h1 id="page-title" class="page-title">Overview</h1>
                <div class="top-bar-actions">
                    <select id="tenant-selector" class="select-sm" title="Filter by tenant" aria-label="Filter by tenant">
                        <option value="">All Tenants</option>
                    </select>
                    <button id="refresh-btn" class="btn btn-ghost btn-sm" title="Refresh data" aria-label="Refresh data">&#8635; Refresh</button>
                </div>
            </header>
            <div id="page-container" class="page-container">
                <!-- Pages are rendered here dynamically -->
                <div id="page-overview" class="page active"></div>
                <div id="page-tenants" class="page"></div>
                <div id="page-memories" class="page"></div>
                <div id="page-sessions" class="page"></div>
                <div id="page-detail" class="page"></div>
                <div id="page-components" class="page"></div>
                <div id="page-events" class="page"></div>
                <div id="page-graph" class="page"></div>
                <div id="page-facts" class="page"></div>
                <div id="page-apiusage" class="page"></div>
                <div id="page-config" class="page"></div>
                <div id="page-retrieval" class="page"></div>
                <div id="page-management" class="page"></div>
            </div>
        </main>
    </div>

    <!-- Scripts: bundle includes neovis.js for offline graph (run: cd src/dashboard && npm install && npm run build) -->
    <script type="module" src="/dashboard/static/js/bundle.js"></script>
</body>
</html>
