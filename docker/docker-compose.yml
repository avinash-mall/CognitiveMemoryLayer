# Phase 1: PostgreSQL (pgvector), Neo4j, Redis, and app test runner.
# Compose interpolates from ../.env, but infra services only receive the vars
# they actually need so app-specific settings do not leak into database images.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memory}
      POSTGRES_DB: ${POSTGRES_DB:-memory}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memory} -d ${POSTGRES_DB:-memory}"]
      interval: 2s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26-community
    environment:
      # The official Neo4j image treats most NEO4J_* env vars as config keys.
      # Passing the whole .env here can turn vars like NEO4J_USER/PASSWORD into
      # invalid neo4j.conf entries and make the container exit at startup.
      NEO4J_AUTH: ${NEO4J_AUTH:-${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}}
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 5

  # App (test runner). Connection vars built from POSTGRES_*, NEO4J_USER/NEO4J_PASSWORD so container and app stay in sync. Rest from ../.env (e.g. EMBEDDING_INTERNAL__BASE_URL for Ollama on host).
  # Reuse repo-local model artifacts by bind-mounting packages/models into the container.
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: test
    env_file:
      - ../.env
    environment:
      DATABASE__POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-memory}:${POSTGRES_PASSWORD:-memory}@postgres:5432/${POSTGRES_DB:-memory}
      DATABASE__NEO4J_URL: bolt://neo4j:7687
      DATABASE__NEO4J_USER: ${NEO4J_USER:-neo4j}
      DATABASE__NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      DATABASE__NEO4J_BROWSER_URL: bolt://localhost:7687
      DATABASE__REDIS_URL: redis://redis:6379
      AUTH__API_KEY: ${AUTH__API_KEY:-test-key}
      AUTH__ADMIN_API_KEY: ${AUTH__ADMIN_API_KEY:-test-key}
      CML_API_KEY: ${CML_API_KEY:-test-key}
      CML_ADMIN_API_KEY: ${CML_ADMIN_API_KEY:-test-key}
      CML_BASE_URL: http://api:8000
      CML_TEST_URL: http://api:8000
      CML_TEST_API_KEY: ${CML_TEST_API_KEY:-test-key}
      DEBUG: ${DEBUG:-false}
      EMBEDDING_INTERNAL__PROVIDER: ${EMBEDDING_INTERNAL__PROVIDER:-mock}
      CUDA_VISIBLE_DEVICES: ""
      FEATURES__USE_LLM_ENABLED: ${FEATURES__USE_LLM_ENABLED:-false}
      LLM_STARTUP_VALIDATION_ENABLED: ${LLM_STARTUP_VALIDATION_ENABLED:-false}
      CML_MODELS_AUTO_DOWNLOAD: ${CML_MODELS_AUTO_DOWNLOAD:-true}
      CML_MODELS_HF_REPO: ${CML_MODELS_HF_REPO:-avinashm/CognitiveMemoryLayer-models}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ../packages/models:/app/packages/models
    command: ["sh", "-c", "alembic upgrade head && pytest tests packages/py-cml/tests -v --tb=short"]

  # API server (Phase 9). Connection vars built from POSTGRES_*, NEO4J_USER/NEO4J_PASSWORD so container and app stay in sync. Rest from ../.env. Run: docker compose up api (after building).
  # Reuse repo-local model artifacts by bind-mounting packages/models into the container.
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    env_file:
      - ../.env
    environment:
      DATABASE__POSTGRES_URL: postgresql+asyncpg://${POSTGRES_USER:-memory}:${POSTGRES_PASSWORD:-memory}@postgres:5432/${POSTGRES_DB:-memory}
      DATABASE__NEO4J_URL: bolt://neo4j:7687
      DATABASE__NEO4J_USER: ${NEO4J_USER:-neo4j}
      DATABASE__NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      DATABASE__NEO4J_BROWSER_URL: bolt://localhost:7687
      DATABASE__REDIS_URL: redis://redis:6379
      # Uses local sentence-transformers on GPU; override to 'openai' for API-based embeddings.
      EMBEDDING_INTERNAL__PROVIDER: ${EMBEDDING_INTERNAL__PROVIDER:-local}
      # Pass CI markers through so startup LLM validation can auto-skip in GitHub Actions.
      CI: ${CI:-}
      GITHUB_ACTIONS: ${GITHUB_ACTIONS:-}
      LLM_STARTUP_VALIDATION_ENABLED: ${LLM_STARTUP_VALIDATION_ENABLED:-true}
      LLM_STARTUP_VALIDATE_IN_CI: ${LLM_STARTUP_VALIDATE_IN_CI:-false}
      LLM_STARTUP_VALIDATION_TIMEOUT_SEC: ${LLM_STARTUP_VALIDATION_TIMEOUT_SEC:-3}
      CML_MODELS_AUTO_DOWNLOAD: ${CML_MODELS_AUTO_DOWNLOAD:-true}
      CML_MODELS_HF_REPO: ${CML_MODELS_HF_REPO:-avinashm/CognitiveMemoryLayer-models}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../packages/models:/app/packages/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["sh", "-c", "python scripts/validate_llm_endpoints.py && alembic upgrade head && uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-1}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
