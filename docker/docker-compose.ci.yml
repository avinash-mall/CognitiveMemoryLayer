services:
  app:
    image: cml-app-ci:latest
    environment:
      AUTH__API_KEY: test-key
      AUTH__ADMIN_API_KEY: test-key
      CML_API_KEY: test-key
      CML_ADMIN_API_KEY: test-key
      CML_BASE_URL: http://api:8000
      CML_TEST_URL: http://api:8000
      CML_TEST_API_KEY: test-key
      DEBUG: false
      EMBEDDING_INTERNAL__PROVIDER: mock
      FEATURES__USE_LLM_ENABLED: false
      LLM_STARTUP_VALIDATION_ENABLED: false
    command: sh -c "alembic upgrade head && pytest tests packages/py-cml/tests -v --tb=short -rs"

  api:
    image: cml-api-ci:latest
    environment:
      AUTH__API_KEY: test-key
      AUTH__ADMIN_API_KEY: test-key
      DEBUG: false
      EMBEDDING_INTERNAL__PROVIDER: mock
      FEATURES__USE_LLM_ENABLED: false
      LLM_STARTUP_VALIDATION_ENABLED: false
      LLM_STARTUP_VALIDATE_IN_CI: false
